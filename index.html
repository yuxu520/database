<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f23; color: #e0e0e0; overflow: hidden; }
#app { display: flex; height: 100vh; }
#sidebar { width: 320px; background: #1a1a2e; border-right: 1px solid #333; display: flex; flex-direction: column; }
#search-box { padding: 16px; border-bottom: 1px solid #333; }
#search-input { width: 100%; padding: 10px 14px; border: 1px solid #444; border-radius: 8px; background: #16213e; color: #fff; font-size: 14px; outline: none; }
#search-input:focus { border-color: #667eea; }
#search-results { max-height: 300px; overflow-y: auto; border-bottom: 1px solid #333; }
.result-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #222; transition: background 0.2s; }
.result-item:hover { background: #16213e; }
.result-item .name { font-weight: 600; color: #667eea; }
.result-item .info { font-size: 12px; color: #888; margin-top: 4px; }
#person-detail { flex: 1; padding: 16px; overflow-y: auto; }
#person-detail h2 { color: #667eea; margin-bottom: 12px; font-size: 20px; }
.detail-row { margin-bottom: 8px; font-size: 13px; }
.detail-label { color: #888; display: inline-block; width: 70px; }
.detail-value { color: #e0e0e0; }
#stats { padding: 12px 16px; border-top: 1px solid #333; font-size: 12px; color: #666; }
#chart-container { flex: 1; position: relative; }
#chart { width: 100%; height: 100%; }
#legend { position: absolute; top: 16px; right: 16px; background: rgba(26,26,46,0.9); padding: 12px 16px; border-radius: 8px; border: 1px solid #333; }
.legend-item { display: flex; align-items: center; margin-bottom: 6px; font-size: 12px; }
.legend-color { width: 24px; height: 4px; border-radius: 2px; margin-right: 8px; }
#controls { position: absolute; top: 16px; left: 16px; display: flex; gap: 8px; }
.ctrl-btn { padding: 8px 14px; border: 1px solid #444; border-radius: 6px; background: rgba(26,26,46,0.9); color: #e0e0e0; cursor: pointer; font-size: 12px; transition: all 0.2s; }
.ctrl-btn:hover { background: #16213e; border-color: #667eea; }
.ctrl-btn.active { background: #667eea; border-color: #667eea; color: #fff; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #667eea; font-size: 16px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="search-box">

    <div id="search-results"></div>
    <div id="person-detail">

    </div>
    <div id="stats"></div>
  </div>
  <div id="chart-container">
    <div id="chart"></div>
    <div id="controls">
      <button class="ctrl-btn active" onclick="toggleEdge('all')">全部关系</button>
      <button class="ctrl-btn" onclick="toggleEdge('strong_colleague')">强相关同事</button>
      <button class="ctrl-btn" onclick="toggleEdge('weak_colleague')">弱相关同事</button>
      <button class="ctrl-btn" onclick="toggleEdge('classmate')">同学</button>
      <button class="ctrl-btn" onclick="toggleEdge('shared_company')">同公司</button>
      <button class="ctrl-btn" onclick="toggleEdge('shared_school')">同学校</button>
    </div>
    <div id="legend">
      <div class="legend-item"><div class="legend-color" style="background:#ff6b6b"></div>强相关同事</div>
      <div class="legend-item"><div class="legend-color" style="background:#ffd93d"></div>弱相关同事</div>
      <div class="legend-item"><div class="legend-color" style="background:#6bcf7f"></div>同学</div>
      <div class="legend-item"><div class="legend-color" style="background:#4ecdc4"></div>同公司(隐含)</div>
      <div class="legend-item"><div class="legend-color" style="background:#a78bfa"></div>同学校(隐含)</div>
    </div>
  </div>
</div>

const EDGE_COLORS = {
  "strong_colleague": "#ff6b6b",
  "weak_colleague": "#ffd93d",
  "classmate": "#6bcf7f",
  "shared_company": "#4ecdc4",
  "shared_school": "#a78bfa"
};
const EDGE_LABELS = {
  "strong_colleague": "强相关同事",
  "weak_colleague": "弱相关同事",
  "classmate": "同学",
  "shared_company": "同公司",
  "shared_school": "同学校"
};

let chart = echarts.init(document.getElementById("chart"), "dark");
let currentPerson = null;
let currentFilter = "all";

// Build adjacency
const adjacency = {};
ALL_EDGES.forEach(e => {
  if (!adjacency[e.source]) adjacency[e.source] = [];
  if (!adjacency[e.target]) adjacency[e.target] = [];
  adjacency[e.source].push(e);
  adjacency[e.target].push({...e, source: e.target, target: e.source});
});

function showPerson(name) {
  currentPerson = name;
  const info = ALL_NODES[name];
  if (!info) return;
  
  // Update detail panel
  const detail = document.getElementById("person-detail");
  let html = `<h2>${name}</h2>`;
  if (info.title) html += `<div class="detail-row"><span class="detail-label">职位</span><span class="detail-value">${info.title}</span></div>`;
  if (info.company) html += `<div class="detail-row"><span class="detail-label">公司</span><span class="detail-value">${info.company}</span></div>`;
  if (info.school) html += `<div class="detail-row"><span class="detail-label">学校</span><span class="detail-value">${info.school}</span></div>`;
  if (info.edu) html += `<div class="detail-row"><span class="detail-label">学历</span><span class="detail-value">${info.edu}</span></div>`;
  if (info.tags) html += `<div class="detail-row"><span class="detail-label">技能</span><span class="detail-value">${info.tags}</span></div>`;
  
  // Count connections by type
  const conns = adjacency[name] || [];
  const typeCounts = {};
  conns.forEach(e => { typeCounts[e.type] = (typeCounts[e.type] || 0) + 1; });
  
  html += `<div style="margin-top:12px;border-top:1px solid #333;padding-top:12px;">`;
  html += `<div style="font-size:13px;color:#888;margin-bottom:8px;">关系网络</div>`;
  Object.entries(typeCounts).forEach(([type, count]) => {
    html += `<div class="detail-row"><span class="detail-label" style="color:${EDGE_COLORS[type]}">${EDGE_LABELS[type]}</span><span class="detail-value">${count}人</span></div>`;
  });
  html += `</div>`;
  
  // List connected people
  const connected = [...new Set(conns.map(e => e.target))];
  html += `<div style="margin-top:12px;border-top:1px solid #333;padding-top:12px;">`;
  html += `<div style="font-size:13px;color:#888;margin-bottom:8px;">关联人才 (${connected.length}人)</div>`;
  connected.slice(0, 30).forEach(cn => {
    const ci = ALL_NODES[cn];
    const connEdge = conns.find(e => e.target === cn);
    const color = connEdge ? EDGE_COLORS[connEdge.type] : "#888";
    html += `<div class="result-item" onclick="showPerson('${cn.replace(/'/g, "\'")}')" style="padding:6px 0;border:none;">`;
    html += `<span class="name" style="color:${color}">${cn}</span>`;
    if (ci) {
      html += `<span class="info">${ci.company || ""} ${ci.title || ""}</span>`;
    }
    html += `</div>`;
  });
  if (connected.length > 30) html += `<div style="color:#666;font-size:12px;padding:4px 0;">...还有 ${connected.length - 30} 人</div>`;
  html += `</div>`;
  
  detail.innerHTML = html;
  
  // Update chart
  renderChart(name);
}

function renderChart(centerName) {
  const conns = adjacency[centerName] || [];
  const filtered = currentFilter === "all" ? conns : conns.filter(e => e.type === currentFilter);
  
  const connectedNames = [...new Set(filtered.map(e => e.target))];
  const allNames = [centerName, ...connectedNames];
  
  // Build node list
  const chartNodes = allNames.map(n => {
    const info = ALL_NODES[n] || {};
    const isCenter = n === centerName;
    return {
      name: n,
      symbolSize: isCenter ? 50 : 28,
      value: isCenter ? 100 : (adjacency[n] ? adjacency[n].length : 1),
      itemStyle: {
        color: isCenter ? "#667eea" : (EDGE_COLORS[Object.keys(typeCountForPerson(n))[0]] || "#4ecdc4"),
        borderColor: isCenter ? "#fff" : "#333",
        borderWidth: isCenter ? 3 : 1,
        shadowBlur: isCenter ? 20 : 5,
        shadowColor: isCenter ? "rgba(102,126,234,0.5)" : "rgba(0,0,0,0.3)"
      },
      label: {
        show: true,
        fontSize: isCenter ? 14 : 11,
        fontWeight: isCenter ? "bold" : "normal",
        color: isCenter ? "#fff" : "#ccc"
      },
      category: isCenter ? 0 : getCategory(n)
    };
  });
  
  // Build edge list
  const chartEdges = filtered.map(e => ({
    source: centerName,
    target: e.target,
    lineStyle: {
      color: EDGE_COLORS[e.type] || "#666",
      width: e.type === "strong_colleague" ? 3 : (e.type === "weak_colleague" ? 2 : 1.5),
      curveness: 0.2,
      opacity: 0.7
    },
    label: {
      show: false
    }
  }));
  
  // Also add edges between connected nodes if they exist
  const connectedSet = new Set(connectedNames);
  connectedNames.forEach(cn => {
    const cnConns = adjacency[cn] || [];
    cnConns.forEach(e => {
      if (connectedSet.has(e.target) && e.target !== centerName) {
        const src = e.source === cn ? cn : e.target;
        const tgt = e.source === cn ? e.target : cn;
        const edgeKey = src + "->" + tgt;
        if (!chartEdges.find(ce => (ce.source === src && ce.target === tgt) || (ce.source === tgt && ce.target === src))) {
          chartEdges.push({
            source: src,
            target: tgt,
            lineStyle: {
              color: EDGE_COLORS[e.type] || "#444",
              width: 1,
              curveness: 0.3,
              opacity: 0.3,
              type: "dashed"
            }
          });
        }
      }
    });
  });
  
  const option = {
    backgroundColor: "#0f0f23",
    tooltip: {
      trigger: "item",
      formatter: function(params) {
        if (params.dataType === "node") {
          const info = ALL_NODES[params.name] || {};
          let tip = `<b>${params.name}</b>`;
          if (info.title) tip += `<br/>${info.title}`;
          if (info.company) tip += `<br/>公司: ${info.company}`;
          if (info.school) tip += `<br/>学校: ${info.school}`;
          return tip;
        }
        return "";
      }
    },
    series: [{
      type: "graph",
      layout: "force",
      data: chartNodes,
      links: chartEdges,
      roam: true,
      draggable: true,
      force: {
        repulsion: 400,
        gravity: 0.1,
        edgeLength: [100, 250],
        friction: 0.6
      },
      emphasis: {
        focus: "adjacency",
        lineStyle: { width: 4 }
      },
      categories: [
        { name: "中心", itemStyle: { color: "#667eea" } },
        { name: "强相关", itemStyle: { color: "#ff6b6b" } },
        { name: "弱相关", itemStyle: { color: "#ffd93d" } },
        { name: "同学", itemStyle: { color: "#6bcf7f" } },
        { name: "同公司", itemStyle: { color: "#4ecdc4" } },
        { name: "同学校", itemStyle: { color: "#a78bfa" } }
      ]
    }]
  };
  
  chart.setOption(option, true);
  
  // Update stats
  document.getElementById("stats").innerHTML = 
    `当前: ${centerName} | 显示 ${connectedNames.length} 个关联 / 总计 ${allNames.length} 节点 / ${chartEdges.length} 条边`;
}

function getCategory(name) {
  const conns = adjacency[currentPerson] || [];
  const edge = conns.find(e => e.target === name);
  if (!edge) return 0;
  const typeMap = { "strong_colleague": 1, "weak_colleague": 2, "classmate": 3, "shared_company": 4, "shared_school": 5 };
  return typeMap[edge.type] || 0;
}

function typeCountForPerson(name) {
  const conns = adjacency[name] || [];
  const counts = {};
  conns.forEach(e => { counts[e.type] = (counts[e.type] || 0) + 1; });
  return counts;
}

function toggleEdge(type) {
  currentFilter = type;
  document.querySelectorAll(".ctrl-btn").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");
  if (currentPerson) renderChart(currentPerson);
}

// Search functionality
const searchInput = document.getElementById("search-input");
const searchResults = document.getElementById("search-results");
const allNames = Object.keys(ALL_NODES).sort();

searchInput.addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) { searchResults.innerHTML = ""; return; }
  
  const matches = allNames.filter(n => n.toLowerCase().includes(q)).slice(0, 20);
  searchResults.innerHTML = matches.map(n => {
    const info = ALL_NODES[n];
    return `<div class="result-item" onclick="showPerson('${n.replace(/'/g, "\\'")}')">
      <div class="name">${n}</div>
      <div class="info">${info.company || ""} | ${info.title || ""}</div>
    </div>`;
  }).join("");
});

// Click on chart node
chart.on("click", function(params) {
  if (params.dataType === "node" && params.name) {
    showPerson(params.name);
  }
});

// Responsive
window.addEventListener("resize", () => chart.resize());

// Show stats
document.getElementById("stats").innerHTML = `共 ${Object.keys(ALL_NODES).length} 人 / ${ALL_EDGES.length} 条关系边`;
</script>
